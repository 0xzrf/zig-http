<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>zig-http contacts</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #101827;
      --card: #172033;
      --text: #eef3ff;
      --muted: #9ca8bd;
      --accent: #7dd3fc;
      --danger: #fca5a5;
      --border: #2c3850;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, #1d4ed8 0, transparent 32rem), var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 2rem;
    }

    main {
      width: min(38rem, 100%);
      background: color-mix(in srgb, var(--card) 92%, transparent);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      padding: 1.5rem;
      box-shadow: 0 1.5rem 4rem rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(1.7rem, 4vw, 2.5rem);
    }

    p {
      margin: 0 0 1.5rem;
      color: var(--muted);
    }

    label {
      display: block;
      margin: 1rem 0 0.4rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    select,
    input,
    button,
    pre {
      width: 100%;
      border-radius: 0.8rem;
      border: 1px solid var(--border);
      font: inherit;
    }

    select,
    input {
      padding: 0.85rem 1rem;
      background: #0d1423;
      color: var(--text);
    }

    button {
      margin-top: 1.25rem;
      padding: 0.9rem 1rem;
      background: var(--accent);
      color: #082032;
      border: 0;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    pre {
      min-height: 7rem;
      margin: 1.25rem 0 0;
      padding: 1rem;
      overflow: auto;
      background: #090e19;
      color: var(--text);
      white-space: pre-wrap;
    }

    .hidden {
      display: none;
    }

    .error {
      color: var(--danger);
    }
  </style>
</head>

<body>
  <main>
    <h1>Contacts API</h1>
    <p>Pick an operation, fill the required fields, and send it to this Zig HTTP server.</p>

    <form id="contact-form">
      <label for="route">Operation</label>
      <select id="route" name="route">
        <option value="get-contact">Get contact</option>
        <option value="upload-contact">Upload contact</option>
        <option value="update-contact">Update contact</option>
        <option value="delete-contact">Delete contact</option>
      </select>

      <label for="contact">Contact</label>
      <input id="contact" name="contact" autocomplete="name" placeholder="Zeref">

      <div id="phone-field" class="hidden">
        <label for="ph">Phone</label>
        <input id="ph" name="ph" autocomplete="tel" placeholder="+91 99999 99999">
      </div>

      <button id="submit" type="submit" disabled>Send request</button>
    </form>

    <pre id="result">Waiting for a request...</pre>
  </main>

  <script>
    const route = document.querySelector("#route");
    const contact = document.querySelector("#contact");
    const phone = document.querySelector("#ph");
    const phoneField = document.querySelector("#phone-field");
    const submit = document.querySelector("#submit");
    const result = document.querySelector("#result");
    const form = document.querySelector("#contact-form");

    const methodByRoute = {
      "get-contact": "GET",
      "upload-contact": "POST",
      "update-contact": "PUT",
      "delete-contact": "DELETE",
    };

    function needsPhone() {
      return route.value === "upload-contact" || route.value === "update-contact";
    }

    function syncFields() {
      phoneField.classList.toggle("hidden", !needsPhone());
      submit.disabled = !contact.value.trim() || (needsPhone() && !phone.value.trim());
    }

    function urlEncodedBody(values) {
      const params = new URLSearchParams();
      for (const [key, value] of Object.entries(values)) {
        params.set(key, value);
      }
      return params.toString();
    }

    async function sendRequest(event) {
      event.preventDefault();

      const selectedRoute = route.value;
      const method = methodByRoute[selectedRoute];
      const contactValue = contact.value.trim();
      const phoneValue = phone.value.trim();

      const options = { method, headers: {} };
      let url = `/${selectedRoute}`;

      if (selectedRoute === "get-contact") {
        url += `?contact=${encodeURIComponent(contactValue)}`;
      } else {
        options.headers["Content-Type"] = "application/x-www-form-urlencoded";
        options.body = selectedRoute === "delete-contact"
          ? urlEncodedBody({ contact: contactValue })
          : urlEncodedBody({ contact: contactValue, ph: phoneValue });
      }

      submit.disabled = true;
      result.classList.remove("error");
      result.textContent = `Sending ${method} ${url}...`;

      try {
        const response = await fetch(url, options);
        const text = await response.text();
        result.textContent = [
          `${response.status} ${response.statusText}`,
          "",
          text || "(empty response)",
        ].join("\n");
        result.classList.toggle("error", !response.ok);
      } catch (err) {
        result.textContent = `Request failed: ${err.message}`;
        result.classList.add("error");
      } finally {
        syncFields();
      }
    }

    route.addEventListener("change", syncFields);
    contact.addEventListener("input", syncFields);
    phone.addEventListener("input", syncFields);
    form.addEventListener("submit", sendRequest);
    syncFields();
  </script>
</body>

</html>
